name: Publish dataset

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: fpv-dataset-publish
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: vars.AWS_PUBLISH_ROLE_ARN != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run catalog:check
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PUBLISH_ROLE_ARN }}
          aws-region: us-east-1
      - run: npm run publish-web:fast
        env:
          FPV_DEPLOY_REDIRECTS: "1"
      - run: npm run dataset:verify
