<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FPV Scenes</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #0c0d0f;
      color: #e8edf2;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      height: 52px;
      padding: 8px 14px;
      background: rgba(10, 12, 15, 0.92);
      border-bottom: 1px solid rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(12px);
    }
    .logo {
      color: #36e4ff;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0;
      white-space: nowrap;
    }
    .top-nav {
      display: flex;
      gap: 4px;
    }
    .top-nav a {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 10px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      color: #aeb8c3;
      text-decoration: none;
      font-size: 13px;
    }
    .top-nav a.active {
      color: #061018;
      background: #36e4ff;
      border-color: #36e4ff;
      font-weight: 800;
    }
    input, select, button {
      min-height: 32px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      color: #e8edf2;
      background: rgba(255, 255, 255, 0.08);
      font: 13px ui-sans-serif, system-ui, sans-serif;
    }
    .scene-picker {
      display: grid;
      grid-template-columns: minmax(150px, 0.7fr) minmax(180px, 1.3fr);
      flex: 1;
      gap: 6px;
      min-width: 0;
      max-width: 520px;
    }
    input, select {
      flex: 1;
      width: 100%;
      min-width: 0;
      padding: 0 8px;
      text-transform: none;
      letter-spacing: 0;
    }
    input:focus { outline: none; border-color: #36e4ff; }
    button {
      padding: 0 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .status {
      padding: 18px;
      color: #8fa0ad;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="/" style="text-decoration:none">FPV Video</a>
    <nav class="top-nav" aria-label="Workflow">
      <a href="/annotate/">Annotate</a>
      <a class="active" href="/scenes/">Scenes</a>
    </nav>
    <div class="scene-picker">
      <input id="sceneSearch" type="search" placeholder="Search scenes" aria-label="Search scenes" autocomplete="off" />
      <select id="sceneSelect" aria-label="Scene">
        <option value="">Loading scenes...</option>
      </select>
    </div>
  </header>
  <div class="status" id="statusText"></div>
  <script src="/tools/apps/shared/published-scenes.js"></script>
  <script>
    const sceneSelect = document.getElementById("sceneSelect");
    const sceneSearch = document.getElementById("sceneSearch");
    const statusText = document.getElementById("statusText");
    let scenes = [];

    function formatScene(scene) {
      const pieces = [];
      if (scene.date) pieces.push(scene.date);
      if (scene.town) pieces.push(scene.town);
      if (scene.segment_ids?.length) pieces.push(scene.segment_ids.join("+"));
      const prefix = pieces.length ? `${pieces.join(" | ")} - ` : "";
      return `${prefix}${scene.description || scene.scene_id}`;
    }

    function sceneSearchText(scene) {
      return `${formatScene(scene)} ${scene.video_file || ""} ${scene.scene_id || ""}`.toLowerCase();
    }

    function renderSceneOptions() {
      const query = sceneSearch.value.trim().toLowerCase();
      const matches = scenes.filter((scene) => !query || sceneSearchText(scene).includes(query));
      sceneSelect.innerHTML = "";
      if (!matches.length) {
        sceneSelect.innerHTML = '<option value="">No scenes match this search</option>';
        sceneSelect.disabled = true;
        return;
      }
      const placeholder = document.createElement("option");
      placeholder.value = "";
      placeholder.textContent = "Select a scene...";
      placeholder.selected = true;
      placeholder.disabled = true;
      sceneSelect.appendChild(placeholder);
      for (const scene of matches) {
        const option = document.createElement("option");
        option.value = scene.scene_id;
        option.textContent = formatScene(scene);
        sceneSelect.appendChild(option);
      }
      sceneSelect.disabled = false;
    }

    function openSelected() {
      if (!sceneSelect.value) return;
      const scene = scenes.find((item) => item.scene_id === sceneSelect.value);
      statusText.textContent = scene ? "Loading scene..." : "Scene not found.";
      if (scene?.viewer_url) location.href = scene.viewer_url;
    }

    async function loadScenes() {
      scenes = await window.loadPublishedScenes();
      if (!scenes.length) {
        sceneSelect.innerHTML = '<option value="">No published scenes</option>';
        sceneSelect.disabled = true;
        sceneSearch.disabled = true;
        statusText.textContent = "No scenes are listed in the published catalog.";
        return;
      }
      renderSceneOptions();
      statusText.textContent = "Select a scene from the dropdown to open it.";
    }

    // Deep-link: /scenes/?scene=<scene_id> opens that scene's viewer directly.
    // location.replace keeps this redirect out of history so Back doesn't bounce.
    function applySceneFromQuery() {
      const wanted = new URLSearchParams(location.search).get("scene");
      if (!wanted) return;
      const scene = scenes.find((item) => item.scene_id === wanted);
      if (!scene || !scene.viewer_url) {
        statusText.textContent = "Linked scene not found.";
        return;
      }
      sceneSelect.value = wanted;
      statusText.textContent = "Opening linked scene...";
      location.replace(scene.viewer_url);
    }

    sceneSelect.addEventListener("change", openSelected);
    sceneSearch.addEventListener("input", renderSceneOptions);
    loadScenes().then(applySceneFromQuery).catch((error) => {
      sceneSelect.innerHTML = '<option value="">Could not load scenes</option>';
      sceneSelect.disabled = true;
      sceneSearch.disabled = true;
      statusText.textContent = error.message;
    });
  </script>
</body>
</html>
