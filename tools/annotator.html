<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FPV Video Annotator</title>
<style>
:root {
  --bg:#06111f; --surf:#0c1c31; --surf2:#10263f; --text:#eaf4ff;
  --muted:#9db5cc; --accent:#56d7ff; --accent2:#ffd166;
  --border:#24435e; --red:#ff7b7b; --green:#4caf50;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
  font-size:14px;overflow:hidden}
button{background:var(--surf2);color:var(--text);border:1px solid var(--border);
  border-radius:6px;padding:5px 10px;cursor:pointer;font-size:13px;transition:background .15s}
button:hover{background:#1a3a5c}
button:disabled{opacity:.35;cursor:default;pointer-events:none}
button.primary{background:var(--accent);color:#03111c;border-color:var(--accent);font-weight:600}
button.primary:hover{background:#3dc8f0}
select,input[type=text]{background:var(--surf2);color:var(--text);
  border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:13px}
select:focus,input:focus{outline:1px solid var(--accent)}

/* HEADER */
header{display:flex;align-items:center;gap:10px;padding:8px 14px;
  background:var(--surf);border-bottom:1px solid var(--border);
  height:50px;flex-shrink:0}
.logo{font-weight:700;font-size:15px;color:var(--accent);white-space:nowrap;letter-spacing:-.01em}
#videoSelect{flex:1;min-width:0;max-width:520px}
.hdr-btns{display:flex;gap:6px;margin-left:auto;flex-shrink:0}

/* LAYOUT */
.workspace{display:flex;height:calc(100vh - 50px);overflow:hidden}

/* PLAYER AREA */
.player-area{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}

.video-wrapper{flex:1;min-height:0;display:flex;align-items:center;
  justify-content:center;background:#010810;position:relative}
#mainVideo{max-width:100%;max-height:100%;display:none;object-fit:contain}
.vid-placeholder{color:#3a6080;text-align:center;user-select:none}
.vid-placeholder .big{font-size:42px;opacity:.4;margin-bottom:8px}
.vid-placeholder p{font-size:13px}
.vid-overlay{position:absolute;top:0;left:0;right:0;
  padding:6px 12px;background:linear-gradient(to bottom,rgba(0,0,0,.65),transparent);
  font-size:12px;color:#aac;pointer-events:none;display:none}
.vid-overlay strong{color:var(--text);font-size:13px;display:block}

/* FILMSTRIP */
.filmstrip-section{flex-shrink:0;background:#070d18;
  border-top:1px solid var(--border)}
.filmstrip-bar{display:flex;align-items:center;gap:8px;padding:3px 10px 0;
  font-size:11px;color:var(--muted)}
#filmstripStatus{font-size:11px;color:var(--muted)}
.filmstrip-container{overflow-x:auto;overflow-y:hidden;height:60px;
  position:relative;cursor:crosshair;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.filmstrip-inner{display:flex;gap:2px;padding:4px;
  position:relative;min-width:100%;height:100%;align-items:center}
.fs-thumb{flex-shrink:0;width:88px;height:50px;background:var(--surf2);
  border-radius:3px;overflow:hidden;cursor:pointer;
  border:1px solid transparent;transition:border-color .1s;position:relative}
.fs-thumb:hover{border-color:var(--accent)}
.fs-thumb canvas{width:100%;height:100%;display:block}
.fs-thumb.loading{background:linear-gradient(90deg,var(--surf2) 0,#162840 40px,var(--surf2) 80px);
  background-size:200% 100%;animation:shimmer 1.4s infinite linear}
@keyframes shimmer{to{background-position:-200% 0}}
.fs-cursor{position:absolute;top:0;bottom:0;width:2px;
  background:var(--red);pointer-events:none;z-index:20;
  box-shadow:0 0 5px var(--red);display:none}
.fs-cursor::before{content:'';position:absolute;top:-1px;left:-4px;
  width:10px;height:10px;background:var(--red);border-radius:50%}
.fs-marker{position:absolute;top:0;bottom:0;width:2px;
  pointer-events:none;z-index:15;opacity:.85}
.fs-marker::after{content:'';position:absolute;bottom:2px;left:-4px;
  width:10px;height:10px;border-radius:2px;background:inherit}

/* CONTROLS */
.controls-bar{flex-shrink:0;display:flex;align-items:center;gap:8px;
  padding:7px 12px;background:var(--surf);border-top:1px solid var(--border)}
.pbtn-group{display:flex;gap:3px}
.pbtn-group button{padding:5px 9px;font-size:13px;min-width:32px}
#btnPlay{font-size:15px;min-width:36px;color:var(--accent);border-color:var(--accent)}
#btnPlay:hover{background:rgba(86,215,255,.1)}
.time-disp{font-variant-numeric:tabular-nums;font-size:13px;
  color:var(--accent2);min-width:130px;text-align:center;font-weight:600}
.time-slider{flex:1;height:4px;accent-color:var(--accent);cursor:pointer}

/* SEGMENTS PANEL */
.seg-panel{width:290px;flex-shrink:0;display:flex;flex-direction:column;
  background:var(--surf);border-left:1px solid var(--border);overflow:hidden}
.add-seg{flex-shrink:0;padding:12px;border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;gap:8px}
.add-seg h3{font-size:11px;text-transform:uppercase;
  letter-spacing:.06em;color:var(--muted)}
.form-row{display:flex;flex-direction:column;gap:3px}
.form-row label{font-size:11px;color:var(--muted)}
.form-row select,.form-row input{width:100%}
#btnMark{width:100%;padding:8px;font-size:13px}
.seg-list-hdr{flex-shrink:0;display:flex;align-items:center;
  justify-content:space-between;padding:7px 12px;
  font-size:11px;text-transform:uppercase;letter-spacing:.06em;
  color:var(--muted);border-bottom:1px solid var(--border)}
#segCount{color:var(--accent2);font-weight:700}
.seg-list{flex:1;overflow-y:auto;scrollbar-width:thin;
  scrollbar-color:var(--border) transparent}
.empty-state{padding:24px 12px;text-align:center;color:var(--muted);font-size:13px}
.seg-item{display:flex;align-items:center;gap:8px;padding:8px 10px;
  border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.seg-item:hover{background:var(--surf2)}
.seg-thumb{flex-shrink:0;width:64px;height:36px;background:var(--surf2);
  border-radius:3px;overflow:hidden;border:1px solid var(--border)}
.seg-thumb canvas{width:64px;height:36px;display:block}
.seg-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.seg-type{font-size:12px;font-weight:600}
.seg-time{font-size:11px;color:var(--accent2);font-variant-numeric:tabular-nums}
.seg-comment{font-size:11px;color:var(--muted);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.seg-del{flex-shrink:0;background:none;border:none;color:var(--muted);
  font-size:14px;padding:2px 5px;cursor:pointer;opacity:0;border-radius:4px;
  transition:opacity .15s}
.seg-item:hover .seg-del{opacity:1}
.seg-del:hover{background:rgba(255,123,123,.2);color:var(--red)}

kbd{background:var(--surf2);border:1px solid var(--border);border-radius:3px;
  padding:1px 4px;font-size:10px;font-family:monospace;color:var(--muted)}
.shortcut-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px 6px;
  padding-top:8px;border-top:1px solid var(--border)}
.sc{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.sc kbd{flex-shrink:0;min-width:16px;text-align:center}
</style>
</head>
<body>

<header>
  <div class="logo">FPV Video Annotator</div>
  <select id="videoSelect"><option value="">— Select a video —</option></select>
  <div class="hdr-btns">
    <button id="btnLoad">Load JSON</button>
    <button id="btnSave" disabled>Save JSON</button>
    <input type="file" id="jsonFile" accept=".json" style="display:none">
  </div>
</header>

<div class="workspace">
  <div class="player-area">
    <div class="video-wrapper">
      <div class="vid-placeholder" id="vidPlaceholder">
        <div class="big">&#9654;</div>
        <p>Select a video from the dropdown above</p>
      </div>
      <div class="vid-overlay" id="vidOverlay">
        <strong id="vidTitle"></strong>
        <span id="vidMeta"></span>
      </div>
      <video id="mainVideo" preload="metadata"></video>
    </div>

    <div class="filmstrip-section">
      <div class="filmstrip-bar">
        <span>Timeline</span>
        <span id="filmstripStatus"></span>
      </div>
      <div class="filmstrip-container" id="fsContainer">
        <div class="filmstrip-inner" id="fsInner"></div>
      </div>
    </div>

    <div class="controls-bar">
      <div class="pbtn-group">
        <button id="btnStart"  title="Go to start [Home]">&#9198;</button>
        <button id="btnJBack"  title="Jump back 10 frames [Shift+&#8592;]">&#9194;</button>
        <button id="btnPrev"   title="Previous frame [&#8592;]">&#9664;</button>
        <button id="btnPlay"   title="Play / Pause [Space]">&#9654;</button>
        <button id="btnNext"   title="Next frame [&#8594;]">&#9654;&#9654;</button>
        <button id="btnJFwd"   title="Jump forward 10 frames [Shift+&#8594;]">&#9193;</button>
        <button id="btnEnd"    title="Go to end [End]">&#9197;</button>
      </div>
      <span class="time-disp" id="timeDisp">—</span>
      <input type="range" id="timeSlider" class="time-slider" min="0" max="10000" value="0" disabled>
    </div>
  </div>

  <div class="seg-panel">
    <div class="add-seg">
      <h3>Add Segment</h3>
      <div class="form-row">
        <label>Type</label>
        <select id="segType">
          <option value="banner_start">Banner Start  [B]</option>
          <option value="flight_start">Flight Start  [F]</option>
          <option value="new_flight_start">New Flight Start  [N]</option>
          <option value="pause_start">Pause Start  [P]</option>
          <option value="replay_start">Replay Start  [R]</option>
          <option value="end">End  [E]</option>
          <option value="other">Other  [O]</option>
        </select>
      </div>
      <div class="form-row">
        <label>Comment</label>
        <input type="text" id="segComment" placeholder="Optional...">
      </div>
      <button id="btnMark" class="primary" disabled>
        Mark at <span id="markAt">—</span> &nbsp;<kbd>M</kbd>
      </button>
      <div class="shortcut-grid">
        <div class="sc"><kbd>B</kbd> Banner</div>
        <div class="sc"><kbd>F</kbd> Flight</div>
        <div class="sc"><kbd>N</kbd> New Flight</div>
        <div class="sc"><kbd>P</kbd> Pause</div>
        <div class="sc"><kbd>R</kbd> Replay</div>
        <div class="sc"><kbd>E</kbd> End</div>
        <div class="sc"><kbd>O</kbd> Other</div>
        <div class="sc"><kbd>M</kbd> Mark</div>
        <div class="sc"><kbd>Space</kbd> Play/Pause</div>
        <div class="sc"><kbd>←</kbd><kbd>→</kbd> ±1 frame</div>
        <div class="sc"><kbd>⇧←</kbd><kbd>⇧→</kbd> ±10 frames</div>
        <div class="sc"><kbd>Home</kbd><kbd>End</kbd> Start/End</div>
      </div>
    </div>
    <div class="seg-list-hdr">
      <span>Segments</span><span id="segCount">0</span>
    </div>
    <div class="seg-list" id="segList">
      <p class="empty-state">No segments marked yet</p>
    </div>
  </div>
</div>

// ─────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────
const SEG = {
  banner_start:     {label:'Banner Start',     color:'#4a9eff'},
  flight_start:     {label:'Flight Start',     color:'#4caf50'},
  new_flight_start: {label:'New Flight Start', color:'#00bcd4'},
  pause_start:      {label:'Pause Start',      color:'#ffd166'},
  replay_start:     {label:'Replay Start',     color:'#ff9800'},
  end:              {label:'End',              color:'#f44336'},
  other:            {label:'Other',            color:'#9e77ed'},
};
const TW = 88, TH = 50, FPS = 30;

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let current = null;
let annotations = [];
let thumbs = [];      // [{time, canvas}]
let thumbAbort = false;

// ─────────────────────────────────────────────
// DOM
// ─────────────────────────────────────────────
const vid   = document.getElementById('mainVideo');
const tvid  = document.getElementById('thumbVideo');
const fsCon = document.getElementById('fsContainer');
const fsIn  = document.getElementById('fsInner');
const g = id => document.getElementById(id);

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
(function init() {
  const sel = g('videoSelect');
  VIDEOS.forEach((v, i) => {
    const o = document.createElement('option');
    o.value = i;
    o.textContent = `${v.date} – ${v.description} (${v.town})`;
    sel.appendChild(o);
  });
  bindEvents();
})();

// ─────────────────────────────────────────────
// LOAD VIDEO
// ─────────────────────────────────────────────
function loadVideo(v) {
  current = v;
  annotations = [];
  thumbAbort = true;
  thumbs = [];

  g('vidPlaceholder').style.display = 'none';
  vid.style.display = 'block';
  g('vidOverlay').style.display = 'block';
  g('vidTitle').textContent = v.description;
  g('vidMeta').textContent  = v.date + ' · ' + v.town;

  fsIn.innerHTML = '';
  g('filmstripStatus').textContent = 'Loading…';

  renderAnnotations();
  setControlsEnabled(false);
  g('btnSave').disabled = true;

  vid.src = v.video_url;
  vid.load();
}

// ─────────────────────────────────────────────
// FILMSTRIP GENERATION
// ─────────────────────────────────────────────
async function generateFilmstrip() {
  const dur = vid.duration;
  if (!dur || isNaN(dur)) return;

  const count = Math.min(200, Math.max(20, Math.ceil(dur * 2)));
  thumbAbort = false;
  thumbs = new Array(count).fill(null);

  fsIn.innerHTML = '';

  // Placeholder divs
  const divs = [];
  for (let i = 0; i < count; i++) {
    const d = document.createElement('div');
    d.className = 'fs-thumb loading';
    d.dataset.time = ((i / count) * dur).toFixed(3);
    fsIn.appendChild(d);
    divs.push(d);
  }

  // Add cursor inside fsIn
  const cursor = document.createElement('div');
  cursor.id = 'fsCursor';
  cursor.className = 'fs-cursor';
  fsIn.appendChild(cursor);

  // Load thumb video
  tvid.src = vid.src;
  tvid.load();
  await new Promise((res, rej) => {
    tvid.addEventListener('loadedmetadata', res, {once: true});
    tvid.addEventListener('error', rej, {once: true});
  }).catch(() => {});

  g('filmstripStatus').textContent = '0%';

  for (let i = 0; i < count; i++) {
    if (thumbAbort) break;

    const time = (i / count) * dur;
    const canvas = await captureAt(tvid, time);
    if (thumbAbort) break;

    thumbs[i] = {time, canvas};

    if (canvas && divs[i]) {
      divs[i].classList.remove('loading');
      divs[i].innerHTML = '';
      divs[i].appendChild(canvas);
    }

    if (i % 5 === 0)
      g('filmstripStatus').textContent = Math.round(((i + 1) / count) * 100) + '%';
  }

  if (!thumbAbort) {
    g('filmstripStatus').textContent = count + ' frames';
    updateFilmstripMarkers();
    // Fill thumb for any annotations added before filmstrip completed
    annotations.forEach(a => {
      if (!a.thumb) a.thumb = thumbForTime(a.time);
    });
    renderAnnotations();
  }
}

function captureAt(v, time) {
  return new Promise(res => {
    const timer = setTimeout(() => {
      v.removeEventListener('seeked', onSeeked);
      res(null);
    }, 4000);

    function onSeeked() {
      clearTimeout(timer);
      v.removeEventListener('seeked', onSeeked);
      const c = document.createElement('canvas');
      c.width = TW; c.height = TH;
      try { c.getContext('2d').drawImage(v, 0, 0, TW, TH); } catch(e) {}
      res(c);
    }

    v.addEventListener('seeked', onSeeked);
    v.currentTime = time;
  });
}

function thumbForTime(t) {
  if (!thumbs.length || !vid.duration) return null;
  const idx = Math.round((t / vid.duration) * (thumbs.length - 1));
  const th = thumbs[Math.max(0, Math.min(idx, thumbs.length - 1))];
  return th ? th.canvas : null;
}

// ─────────────────────────────────────────────
// PLAYBACK
// ─────────────────────────────────────────────
function seek(t) {
  vid.currentTime = Math.max(0, Math.min(t, vid.duration || 0));
}

function step(n) { seek(vid.currentTime + n / FPS); }

function togglePlay() {
  vid.paused ? vid.play() : vid.pause();
}

// ─────────────────────────────────────────────
// TIME DISPLAY & CURSOR
// ─────────────────────────────────────────────
function fmt(s) {
  if (!s || isNaN(s)) return '0:00.0';
  const m = Math.floor(s / 60);
  return m + ':' + (s % 60).toFixed(1).padStart(4, '0');
}

function onTimeUpdate() {
  const cur = vid.currentTime, dur = vid.duration || 0;
  g('timeDisp').textContent = fmt(cur) + ' / ' + fmt(dur);
  g('markAt').textContent   = fmt(cur);
  if (dur > 0) g('timeSlider').value = (cur / dur) * 10000;

  const cursor = g('fsCursor');
  if (!cursor || !dur) return;
  const iw = fsIn.scrollWidth;
  const x = (cur / dur) * iw;
  cursor.style.left = x + 'px';
  cursor.style.display = 'block';

  // Auto-scroll to keep cursor visible when playing
  if (!vid.paused) {
    const cw = fsCon.clientWidth;
    const sl = fsCon.scrollLeft;
    if (x < sl + 60 || x > sl + cw - 60)
      fsCon.scrollLeft = Math.max(0, x - cw / 2);
  }
}

// ─────────────────────────────────────────────
// ANNOTATIONS
// ─────────────────────────────────────────────
function markSegment() {
  if (!current || vid.readyState < 1) return;

  const time    = vid.currentTime;
  const type    = g('segType').value;
  const comment = g('segComment').value.trim();

  // Capture frame from main video
  const thumb = (() => {
    const c = document.createElement('canvas');
    c.width = 64; c.height = 36;
    try { c.getContext('2d').drawImage(vid, 0, 0, 64, 36); } catch(e) { return null; }
    return c;
  })();

  const ann = {id: Date.now() + Math.random(), time, type, comment, thumb};
  const i = annotations.findIndex(a => a.time > time);
  if (i === -1) annotations.push(ann); else annotations.splice(i, 0, ann);

  g('segComment').value = '';
  renderAnnotations();
  updateFilmstripMarkers();
}

function deleteAnn(id) {
  annotations = annotations.filter(a => a.id !== id);
  renderAnnotations();
  updateFilmstripMarkers();
}

function renderAnnotations() {
  const list = g('segList');
  g('segCount').textContent = annotations.length;

  if (!annotations.length) {
    list.innerHTML = '<p class="empty-state">No segments marked yet</p>';
    return;
  }

  list.innerHTML = '';
  annotations.forEach(ann => {
    const t = SEG[ann.type] || {label: ann.type, color:'#888'};
    const item = document.createElement('div');
    item.className = 'seg-item';

    // Thumbnail
    const thumb = document.createElement('div');
    thumb.className = 'seg-thumb';
    if (ann.thumb) {
      const c2 = document.createElement('canvas');
      c2.width = 64; c2.height = 36;
      try { c2.getContext('2d').drawImage(ann.thumb, 0, 0, 64, 36); } catch(e) {}
      thumb.appendChild(c2);
    }

    // Info
    const info = document.createElement('div');
    info.className = 'seg-info';
    info.innerHTML =
      `<span class="seg-type" style="color:${t.color}">${t.label}</span>` +
      `<span class="seg-time">${fmt(ann.time)}</span>` +
      (ann.comment ? `<span class="seg-comment" title="${ann.comment}">${ann.comment}</span>` : '');

    // Delete button
    const del = document.createElement('button');
    del.className = 'seg-del';
    del.textContent = '✕';
    del.title = 'Remove';
    del.addEventListener('click', e => { e.stopPropagation(); deleteAnn(ann.id); });

    item.appendChild(thumb);
    item.appendChild(info);
    item.appendChild(del);
    item.addEventListener('click', () => seek(ann.time));
    list.appendChild(item);
  });
}

function updateFilmstripMarkers() {
  document.querySelectorAll('.fs-marker').forEach(e => e.remove());
  if (!vid.duration) return;
  const iw = fsIn.scrollWidth;
  const dur = vid.duration;
  annotations.forEach(ann => {
    const t = SEG[ann.type] || {color:'#888'};
    const m = document.createElement('div');
    m.className = 'fs-marker';
    m.style.left = ((ann.time / dur) * iw) + 'px';
    m.style.background = t.color;
    m.title = (SEG[ann.type] || {label:ann.type}).label + ' ' + fmt(ann.time);
    fsIn.appendChild(m);
  });
}

// ─────────────────────────────────────────────
// SAVE / LOAD JSON
// ─────────────────────────────────────────────
function saveJSON() {
  if (!current) return;
  const stem = current.video_url.split('/').pop().replace('.mp4','');
  const data = {
    video_file:  stem + '.mp4',
    video_url:   current.video_url,
    description: current.description,
    date:        current.date,
    town:        current.town,
    annotated_at: new Date().toISOString(),
    segments: annotations.map(a => ({
      time:           parseFloat(a.time.toFixed(3)),
      time_formatted: fmt(a.time),
      type:           a.type,
      label:          (SEG[a.type] || {label:a.type}).label,
      comment:        a.comment || '',
    })),
  };
  const url = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], {type:'application/json'}));
  const a = document.createElement('a');
  a.href = url; a.download = stem + '_annotations.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function loadJSON(file) {
  const r = new FileReader();
  r.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      const idx = VIDEOS.findIndex(v => v.video_url === d.video_url ||
        v.video_url.endsWith('/' + d.video_file));
      if (idx !== -1) {
        g('videoSelect').value = idx;
        loadVideo(VIDEOS[idx]);
        vid.addEventListener('loadedmetadata', () => {
          annotations = (d.segments || []).map(s => ({
            id: Date.now() + Math.random(),
            time: s.time, type: s.type,
            comment: s.comment || '', thumb: null,
          }));
          renderAnnotations();
          updateFilmstripMarkers();
        }, {once: true});
      } else {
        alert('Could not find matching video for this annotation file.');
      }
    } catch(err) { alert('Failed to parse JSON: ' + err.message); }
  };
  r.readAsText(file);
}

// ─────────────────────────────────────────────
// CONTROLS ENABLE / DISABLE
// ─────────────────────────────────────────────
function setControlsEnabled(on) {
  ['btnStart','btnJBack','btnPrev','btnPlay','btnNext','btnJFwd','btnEnd','btnMark']
    .forEach(id => { g(id).disabled = !on; });
  g('timeSlider').disabled = !on;
}

// ─────────────────────────────────────────────
// EVENT LISTENERS
// ─────────────────────────────────────────────
function markAs(type) {
  g('segType').value = type;
  markSegment();
}

function bindEvents() {
  // Video selector
  g('videoSelect').addEventListener('change', e => {
    const v = VIDEOS[e.target.value];
    if (v) loadVideo(v);
  });

  // Video events
  vid.addEventListener('loadedmetadata', () => {
    setControlsEnabled(true);
    g('btnSave').disabled = false;
    onTimeUpdate();
    generateFilmstrip();
  });
  vid.addEventListener('timeupdate', onTimeUpdate);
  vid.addEventListener('play',  () => { g('btnPlay').innerHTML = '&#9646;&#9646;'; });
  vid.addEventListener('pause', () => { g('btnPlay').innerHTML = '&#9654;'; });
  vid.addEventListener('ended', () => { g('btnPlay').innerHTML = '&#9654;'; });

  // Playback buttons
  g('btnPlay').addEventListener('click', togglePlay);
  g('btnStart').addEventListener('click', () => seek(0));
  g('btnEnd').addEventListener('click',   () => seek(vid.duration));
  g('btnPrev').addEventListener('click',  () => step(-1));
  g('btnNext').addEventListener('click',  () => step(1));
  g('btnJBack').addEventListener('click', () => step(-10));
  g('btnJFwd').addEventListener('click',  () => step(10));

  // Time slider
  g('timeSlider').addEventListener('input', e => {
    seek((e.target.value / 10000) * vid.duration);
  });

  // Filmstrip click
  fsCon.addEventListener('click', e => {
    if (!vid.duration) return;
    const rect = fsIn.getBoundingClientRect();
    const x = e.clientX - rect.left + fsCon.scrollLeft;
    seek((x / fsIn.scrollWidth) * vid.duration);
  });

  // Segment controls
  g('btnMark').addEventListener('click', markSegment);
  g('segComment').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); markSegment(); }
  });

  // Save / load
  g('btnSave').addEventListener('click', saveJSON);
  g('btnLoad').addEventListener('click', () => g('jsonFile').click());
  g('jsonFile').addEventListener('change', e => {
    if (e.target.files[0]) { loadJSON(e.target.files[0]); e.target.value = ''; }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    const tag = document.activeElement.tagName;
    if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
    switch(e.key) {
      case ' ':          e.preventDefault(); if (current) togglePlay(); break;
      case 'ArrowLeft':  e.preventDefault(); if (current) step(e.shiftKey ? -10 : -1); break;
      case 'ArrowRight': e.preventDefault(); if (current) step(e.shiftKey ?  10 :  1); break;
      case 'Home':       e.preventDefault(); if (current) seek(0); break;
      case 'End':        e.preventDefault(); if (current) seek(vid.duration); break;
      case 'm': case 'M': markSegment(); break;
      case 'b': case 'B': markAs('banner_start'); break;
      case 'f': case 'F': markAs('flight_start'); break;
      case 'n': case 'N': markAs('new_flight_start'); break;
      case 'p': case 'P': markAs('pause_start'); break;
      case 'r': case 'R': markAs('replay_start'); break;
      case 'e': case 'E': markAs('end'); break;
      case 'o': case 'O': markAs('other'); break;
    }
  });
}
</script>
